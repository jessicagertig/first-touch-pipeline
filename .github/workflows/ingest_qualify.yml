name: Ingest & Qualify (Stage A)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Read & qualify leads
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_LEADS_CHANNEL_ID: ${{ secrets.SLACK_LEADS_CHANNEL_ID }}
          SLACK_GOOD_LEADS_CHANNEL_ID: ${{ secrets.SLACK_GOOD_LEADS_CHANNEL_ID }}
        run: python -m scripts.slack_leads_reader

      - name: Commit state changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add state/
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "ingest: update leads"
            git pull --rebase
            git push
          fi
