name: Create Gmail Draft (Stage C)

on:
  workflow_dispatch:
    inputs:
      lead_id:
        description: 'Lead ID to create the Gmail draft for.'
        required: true
        type: string
      variant_n:
        description: 'Which drafted variation to use (e.g. 1).'
        required: true
        type: string

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create Gmail draft
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_REVIEW_CHANNEL_ID: ${{ secrets.SLACK_REVIEW_CHANNEL_ID }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python -m scripts.gmail_draft --lead "${{ github.event.inputs.lead_id }}" --variant "${{ github.event.inputs.variant_n }}"

      - name: Commit state changes
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add state/
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "draft: lead ${{ github.event.inputs.lead_id }} variant ${{ github.event.inputs.variant_n }}"
            git pull --rebase
            git push
          fi
